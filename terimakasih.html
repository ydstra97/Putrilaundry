<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terima Kasih - PUTRI LAUNDRY</title>
  <meta name="description" content="Terima kasih atas kepercayaan Anda kepada PUTRI LAUNDRY." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: #0f172a;
      background:
        radial-gradient(circle at top left, rgba(236, 72, 153, 0.26), transparent 34%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.22), transparent 34%),
        linear-gradient(135deg, #fff7fb 0%, #ffffff 45%, #f5f3ff 100%);
    }
    .card {
      width: min(760px, 100%);
      overflow: hidden;
      border: 1px solid rgba(236, 72, 153, 0.18);
      border-radius: 38px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(16px);
    }
    .top {
      padding: 36px 28px;
      color: white;
      text-align: center;
      background: linear-gradient(135deg, #ec4899, #7c3aed);
    }
    .icon {
      width: 92px;
      height: 92px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      border-radius: 32px;
      font-size: 50px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
    }
    h1 { font-size: clamp(34px, 7vw, 60px); line-height: 1.05; letter-spacing: -2px; }
    .content { padding: 28px; text-align: center; }
    p { max-width: 580px; margin: 0 auto; color: #475569; font-size: 17px; line-height: 1.8; }
    .brand { margin-top: 18px; font-weight: 1000; color: #be185d; letter-spacing: 1px; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 26px; }
    a { display: inline-flex; align-items: center; justify-content: center; border-radius: 18px; padding: 15px 16px; font-weight: 1000; text-decoration: none; }
    .home { color: white; background: linear-gradient(135deg, #ec4899, #7c3aed); }
    .wa { color: #0f172a; background: #e2e8f0; }
    @media (max-width: 560px) { .actions { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="card">
    <section class="top">
      <div class="icon">✓</div>
      <h1>Terima kasih atas kepercayaan Anda</h1>
    </section>
    <section class="content">
      <p>Pesanan kamu sudah berhasil dikirim ke admin PUTRI LAUNDRY. Bukti pembayaran akan dicek, lalu laundry segera diproses.</p>
      <div class="brand">PUTRI LAUNDRY</div>
      <div class="actions">
        <a class="home" href="./">Kembali ke Beranda</a>
        <a class="wa" href="https://wa.me/6283119879961" target="_blank" rel="noopener">Hubungi Admin</a>
      </div>
    </section>
  </main>
</body>
</html>
